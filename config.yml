name: sym-package-authoring
version: 1.4.0
description: Best practices for creating effective Symposia packages
files:
  - path: files/QUICK_REFERENCE.md
    dest: .claude/docs/package-authoring/QUICK_REFERENCE.md
  - path: files/CONTENT_PATTERNS.md
    dest: .claude/docs/package-authoring/CONTENT_PATTERNS.md
  - path: files/FILE_STRUCTURE.md
    dest: .claude/docs/package-authoring/FILE_STRUCTURE.md
  - path: files/EXAMPLES.md
    dest: .claude/docs/package-authoring/EXAMPLES.md
  - path: files/PUBLISHING.md
    dest: .claude/docs/package-authoring/PUBLISHING.md
  - path: files/SKILLS_AND_HOOKS.md
    dest: .claude/docs/package-authoring/SKILLS_AND_HOOKS.md
instructions:
  - targets:
      claude: CLAUDE.md
      cursor: .cursorrules
      copilot: .github/copilot-instructions.md
      default: AGENTS.md
    content: |
      ## Package Authoring

      When creating, editing, or auditing Symposia packages (.symposia/), follow `.claude/docs/package-authoring/QUICK_REFERENCE.md` for content patterns and file structure. See `PUBLISHING.md` for registry.yml and the publish flow. See `SKILLS_AND_HOOKS.md` for shipping skills, hooks, and config templates. **MUST** use imperative voice and decision tables.
